services:
  db:
    image: postgres:15
    container_name: hello-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hellodb
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - hello-network

  backend:
    build: ./backend
    container_name: hello-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "5000:5000"   # Exposed for testing (optional)
    networks:
      - hello-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SERVER_URL: http://localhost:5000
    container_name: hello-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - hello-network

volumes:
  db_data:

networks:
  hello-network:



