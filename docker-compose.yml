services:
  backend:
    image: basit/hello-backend:latest
    restart: always
    env_file:
      - .env
    networks:
      - app-network

  frontend:
    image: basit/hello-frontend:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
